<div class="page-hero">
  <h1>球隊公告</h1>
  <p>訓練異動、賽事通知、重要訊息</p>
</div>

<main>
  <div id="news-list">
    <div class="loading-box"><div class="spinner"></div>資料載入中…</div>
  </div>
</main>

<footer>
  <div class="footer-name">台中市力行國小棒球隊 LiSing Baseball</div>
  <div class="footer-links"><a href="about.html">關於球隊</a><a href="contact.html">聯絡我們</a></div>

</footer>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/main.js"></script>
<script>
(async () => {
  const el = document.getElementById('news-list');
  const data = await fetchSheet('news');
  if (data === null) { showPending(el, '球隊公告'); return; }
  if (!data.length) { showEmpty(el, '目前尚無公告。'); return; }
  const sorted = data.sort((a,b) => {
    if (a.pinned === 'true' && b.pinned !== 'true') return -1;
    if (b.pinned === 'true' && a.pinned !== 'true') return 1;
    return b.date.localeCompare(a.date);
  });
  el.innerHTML = sorted.map(n => `
    <div class="card news-card mb-2">
      <div class="news-card-header">
        ${n.pinned==='true' ? '<span class="badge badge-pinned">置頂</span>' : ''}
        ${n.category ? `<span class="badge badge-gray">${n.category}</span>` : ''}
        <span class="news-card-date">${formatDate(n.date)}</span>
      </div>
      <div class="news-card-title">${n.title || '（未填標題）'}</div>
      ${n.content ? `<div class="news-card-content">${n.content}</div>` : ''}
    </div>`).join('');
})();
</script>
</body>
</html>
