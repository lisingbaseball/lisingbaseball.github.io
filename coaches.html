<header>
  <div class="header-inner">
    <a href="index.html" class="logo-wrap">

    <nav>
      <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>
      <a href="coaches.html">教練團</a><a href="news.html">球隊公告</a>
      <a href="honors.html">榮譽榜</a><a href="alumni.html">職棒校友</a><a href="recruit.html">球員招募</a><a href="contact.html">聯絡我們</a>
    </nav>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>

</header>

<div class="page-hero">
  <h1>教練團介紹</h1>
  <p>用心陪伴每位球員成長的師長</p>
</div>

<main>
  <div class="grid-2" id="coaches-list">
    <div class="loading-box" style="grid-column:1/-1;"><div class="spinner"></div>資料載入中…</div>
  </div>
</main>

<footer>
  <div class="footer-name">台中市力行國小棒球隊 LiSing Baseball</div>
  <div class="footer-links"><a href="about.html">關於球隊</a><a href="contact.html">聯絡我們</a></div>
  <div>© 2026 力行國小棒球隊</div>
</footer>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/main.js"></script>
<script>
(async () => {
  const el = document.getElementById('coaches-list');
  const data = await fetchSheet('coaches');
  if (data === null) { el.innerHTML = '<div class="empty-box" style="grid-column:1/-1;">⚾ 教練團資料整理中，敬請期待。</div>'; return; }
  if (!data.length) { el.innerHTML = '<div class="empty-box" style="grid-column:1/-1;">目前尚無教練資料。</div>'; return; }
  // 逐一建立 DOM，intro 用 textContent 避免 XSS，同時保留換行
  el.innerHTML = '';
  data.forEach(c => {
    const initials = avatarInitials(c.name);
    const card = document.createElement('div');
    card.className = 'card';

    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'coach-avatar';
    if (c.photo_url) {
      const img = document.createElement('img');
      img.src = c.photo_url;
      img.alt = c.name || '';
      img.onerror = () => { avatarDiv.textContent = initials; };
      avatarDiv.appendChild(img);
    } else {
      avatarDiv.textContent = initials;
    }

    const infoDiv = document.createElement('div');
    infoDiv.className = 'coach-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'coach-name';
    nameEl.textContent = c.name || '';

    const titleEl = document.createElement('div');
    titleEl.className = 'coach-title';
    titleEl.textContent = c.title || '';

    infoDiv.appendChild(nameEl);
    infoDiv.appendChild(titleEl);

    if (c.license) {
      const licEl = document.createElement('div');
      licEl.className = 'coach-license';
      licEl.textContent = '📋 ' + c.license;
      infoDiv.appendChild(licEl);
    }

    if (c.intro) {
      const introEl = document.createElement('div');
      introEl.className = 'coach-intro';
      introEl.textContent = c.intro; // textContent 保留換行並防止 XSS
      infoDiv.appendChild(introEl);
    }

    const coachCard = document.createElement('div');
    coachCard.className = 'coach-card';
    coachCard.appendChild(avatarDiv);
    coachCard.appendChild(infoDiv);

    card.appendChild(coachCard);
    el.appendChild(card);
  });
})();
</script>
</body>
</html>
