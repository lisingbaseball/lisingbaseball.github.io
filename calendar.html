<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/main.js"></script>
<script>
(async () => {
  const el = document.getElementById('cal-list');
  const data = await fetchSheet('calendar');
  if (data === null) { showPending(el, '行事曆'); return; }
  if (!data.length) { showEmpty(el, '目前尚無排程。'); return; }

  const sorted = data.sort((a,b) => a.date.localeCompare(b.date));

  // 依月份分組
  const groups = {};
  sorted.forEach(item => {
    const d = new Date(item.date);
    const key = isNaN(d) ? item.date.slice(0,7) : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  el.innerHTML = Object.keys(groups).sort().map(monthKey => {
    const [y, m] = monthKey.split('-');
    const label = `${y} 年 ${parseInt(m)} 月`;
    const items = groups[monthKey].map(c => {
      const {m: cm, d: cd} = getMonthDay(c.date);
      return `<div class="calendar-item">
        <div class="cal-date-box"><div class="cal-month">${cm}月</div><div class="cal-day">${cd}</div></div>
        <div class="cal-info">
          <div class="cal-title">${c.title || '活動'}</div>
          <div class="cal-loc">${c.time ? '⏰ ' + c.time + '　' : ''}${c.location ? '📍 ' + c.location : ''}</div>
          ${c.note ? `<div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem;">備註：${c.note}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div class="card mb-2">
      <div style="font-weight:700;color:var(--navy);margin-bottom:0.75rem;font-size:1rem;border-bottom:2px solid var(--gold);padding-bottom:0.4rem;">📅 ${label}</div>
      ${items}
    </div>`;
  }).join('');
})();
</script>
</body>
