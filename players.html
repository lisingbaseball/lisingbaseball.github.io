<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隊員介紹 - 台中市力行國小棒球隊</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo-wrap">
      <img src="assets/logo.png" alt="Logo">
      <div class="logo-text">台中市力行國小少棒隊<span>LiSing Baseball</span></div>
    </a>
    <nav>
      <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>
      <a href="coaches.html">教練團</a><a href="news.html">球隊公告</a>
      <a href="honors.html">榮譽榜</a><a href="contact.html">聯絡我們</a>
    </nav>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>
    <a href="coaches.html">教練團</a><a href="news.html">球隊公告</a>
    <a href="honors.html">榮譽榜</a><a href="contact.html">聯絡我們</a>
  </nav>
</header>

<div class="page-hero">
  <h1>隊員介紹</h1>
  <p>力行少棒的每一位小球員</p>
</div>

<main>
  <div id="players-list" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;">
    <div class="loading-box" style="grid-column:1/-1;"><div class="spinner"></div>資料載入中…</div>
  </div>
</main>

<footer>
  <div class="footer-name">台中市力行國小棒球隊 LiSing Baseball</div>
  <div class="footer-links"><a href="about.html">關於球隊</a><a href="contact.html">聯絡我們</a></div>
  <div>© 2025 力行國小棒球隊．網站採 GitHub Pages 免費架設</div>
</footer>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/main.js"></script>
<style>
  #players-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
  @media (min-width: 600px)  { #players-list { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 900px)  { #players-list { grid-template-columns: repeat(5, 1fr); } }
  .p-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(13,43,84,0.07); text-align: center; padding: 1rem 0.75rem; }
  .p-photo { width: 100%; height: auto; object-fit: unset; border-radius: 8px; display: block; background: #eef2f8; }
  .p-name  { margin-top: 0.6rem; font-weight: 700; color: #0d2b54; font-size: 0.95rem; }
</style>
<script>
(async () => {
  const el = document.getElementById('players-list');
  const data = await fetchSheet('players');
  if (data === null) { el.innerHTML = '<div class="empty-box" style="grid-column:1/-1;">⚾ 隊員資料整理中，敬請期待。</div>'; return; }
  if (!data.length) { el.innerHTML = '<div class="empty-box" style="grid-column:1/-1;">目前尚無隊員資料。</div>'; return; }
  el.innerHTML = data.map(p => {
    const src = p.photo_url ? p.photo_url : 'assets/player-placeholder.svg';
    const alt = p.name || '隊員';
    return `<div class="p-card">
      <img class="p-photo" src="${src}" alt="${alt}" onerror="this.src='assets/player-placeholder.svg'">
      <div class="p-name">${p.name || ''}</div>
    </div>`;
  }).join('');
})();
</script>
</body>
</html>
