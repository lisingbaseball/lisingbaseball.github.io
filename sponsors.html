<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贊助芳名錄 - 台中市力行國小棒球隊</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo-wrap">
      <img src="assets/logo-placeholder.svg" alt="Logo">
      <div class="logo-text">台中市力行國小棒球隊<span>LiSing Baseball</span></div>
    </a>
    <nav>
      <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>
      <a href="coaches.html">教練團</a><a href="news.html">球隊公告</a><a href="calendar.html">行事曆</a>
      <a href="honors.html">榮譽榜</a><a href="sponsors.html">贊助芳名錄</a><a href="contact.html">聯絡我們</a>
    </nav>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>
    <a href="coaches.html">教練團</a><a href="news.html">球隊公告</a><a href="calendar.html">行事曆</a>
    <a href="honors.html">榮譽榜</a><a href="sponsors.html">贊助芳名錄</a><a href="contact.html">聯絡我們</a>
  </nav>
</header>

<div class="page-hero">
  <h1>贊助芳名錄</h1>
  <p>感謝每一位支持力行棒球的家長、企業與朋友</p>
</div>

<main>
  <p style="text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;">
    每一份支持，都是孩子前進的動力。感謝您們的愛心與付出。🙏
  </p>
  <div class="grid-3" id="sponsors-list">
    <div class="loading-box" style="grid-column:1/-1;"><div class="spinner"></div>資料載入中…</div>
  </div>

  <hr class="divider">
  <div class="card mt-2" style="text-align:center;">
    <h3 style="color:var(--navy);margin-bottom:0.5rem;">📋 完整贊助明細</h3>
    <div class="table-wrap mt-2" id="sponsors-table" style="text-align:left;"></div>
  </div>
</main>

<footer>
  <div class="footer-name">台中市力行國小棒球隊 LiSing Baseball</div>
  <div class="footer-links"><a href="about.html">關於球隊</a><a href="contact.html">聯絡我們</a></div>
  <div>© 2025 力行國小棒球隊．網站採 GitHub Pages 免費架設</div>
</footer>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/main.js"></script>
<script>
(async () => {
  const el = document.getElementById('sponsors-list');
  const tableEl = document.getElementById('sponsors-table');
  const data = await fetchSheet('sponsors');
  if (data === null) { showPending(el, '贊助芳名錄'); tableEl.innerHTML = ''; return; }
  if (!data.length) { showEmpty(el, '感謝所有支持力行棒球的朋友！'); tableEl.innerHTML = ''; return; }

  // 卡片
  el.innerHTML = data.map(s => {
    const logoHtml = s.logo_url
      ? `<img src="${s.logo_url}" alt="${s.name}" class="sponsor-logo" onerror="this.outerHTML='<div class=sponsor-logo-text>${s.name.slice(0,2)}</div>'">`
      : `<div class="sponsor-logo-text">${s.name.slice(0,2)}</div>`;
    return `<div class="card sponsor-card">
      ${logoHtml}
      <div class="sponsor-name">${s.name}</div>
      <div class="sponsor-item">${s.item || ''}</div>
      ${s.date ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.2rem;">${formatDate(s.date)}</div>` : ''}
    </div>`;
  }).join('');

  // 表格
  tableEl.innerHTML = `<table>
    <thead><tr><th>贊助者／公司</th><th>贊助項目</th><th>金額</th><th>日期</th><th>備註</th></tr></thead>
    <tbody>${data.map(s => `<tr>
      <td><strong>${s.name}</strong></td>
      <td>${s.item || ''}</td>
      <td>${s.amount || ''}</td>
      <td>${formatDate(s.date)}</td>
      <td>${s.note || ''}</td>
    </tr>`).join('')}</tbody>
  </table>`;
})();
</script>
</body>
</html>
