</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo-wrap">
      <img src="assets/logo-placeholder.svg" alt="Logo">
      <div class="logo-text">台中市力行國小棒球隊<span>LiSing Baseball</span></div>
    </a>
    <nav>
      <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>
      <a href="coaches.html">教練團</a><a href="news.html">球隊公告</a>
      <a href="honors.html">榮譽榜</a><a href="contact.html">聯絡我們</a>
    </nav>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="index.html">首頁</a><a href="about.html">關於球隊</a><a href="players.html">隊員介紹</a>
    <a href="coaches.html">教練團</a><a href="news.html">球隊公告</a>
    <a href="honors.html">榮譽榜</a><a href="contact.html">聯絡我們</a>
  </nav>
</header>

<div class="page-hero">
  <h1>榮譽榜</h1>
  <p>力行棒球的每一份驕傲</p>
</div>

<main>
  <div id="honors-list">
    <div class="loading-box"><div class="spinner"></div>資料載入中…</div>
  </div>
</main>

<footer>
  <div class="footer-name">台中市力行國小棒球隊 LiSing Baseball</div>
  <div class="footer-links"><a href="about.html">關於球隊</a><a href="contact.html">聯絡我們</a></div>
  <div>© 2025 力行國小棒球隊．網站採 GitHub Pages 免費架設</div>
</footer>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/main.js"></script>
<script>
(async () => {
  const el = document.getElementById('honors-list');
  const data = await fetchSheet('honors');
  if (data === null) { showPending(el, '榮譽榜'); return; }
  if (!data.length) { showEmpty(el, '榮譽整理中，精彩成績陸續補上！'); return; }

  const groups = {};
  data.sort((a,b) => b.year.localeCompare(a.year)).forEach(h => {
    if (!groups[h.year]) groups[h.year] = [];
    groups[h.year].push(h);
  });

  el.innerHTML = Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(year => {
    const items = groups[year].map(h => `
      <div class="honor-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;flex-wrap:wrap;">
          <div class="honor-event">🏆 ${h.event || ''}</div>
          <div class="honor-result">${h.result || ''}</div>
        </div>
        ${h.note ? `<div class="honor-note">${h.note}</div>` : ''}
      </div>`).join('');
    return `<div class="honor-year-group card">
      <div class="honor-year-label">${year} 年度</div>
      ${items}
    </div>`;
  }).join('');
})();
</script>
</body>
</html>
